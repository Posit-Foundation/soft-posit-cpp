name: Clang-Tidy Static Analysis

on:
  push:
    branches: [ "main", "refactor-cpp-soft-posits" ]
  pull_request:
    branches: [ "main", "refactor-cpp-soft-posits" ]

jobs:
  setup:
    uses: ./.github/workflows/shared-setup.yml
    with:
      clang_tools: true
      cmake_extra_args: "-DCMAKE_EXPORT_COMPILE_COMMANDS=ON"
  
  analyze:
    needs: setup
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-tidy-14

    - name: Run clang-tidy
      run: |
        find src include tests -name "*.cpp" -o -name "*.h" -o -name "*.c" | \
        xargs clang-tidy-14 -p ${{ needs.setup.outputs.build_dir }}/compile_commands.json \
        -checks='-*,performance-*,readability-*,bugprone-*,modernize-*,clang-analyzer-*,cppcoreguidelines-*,misc-*,-modernize-use-trailing-return-type' \
        --warnings-as-errors='*' 