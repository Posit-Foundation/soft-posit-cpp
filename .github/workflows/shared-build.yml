name: Shared Build

on:
  workflow_call:
    inputs:
      platform:
        required: false
        type: string
        default: 'ubuntu-latest'
      cache_key:
        required: true
        type: string
      build_targets:
        required: false
        type: string
        default: ''
      test_targets:
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: ${{ inputs.platform }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    # Restore build cache
    - name: Restore build cache
      id: cache-build
      uses: actions/cache@v3
      with:
        path: build
        key: ${{ inputs.cache_key }}
        
    # Always set up dependencies, regardless of cache
    - name: Set up dependencies (Ubuntu)
      if: inputs.platform == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ make cmake ninja-build
      
    - name: Set up dependencies (macOS)
      if: inputs.platform == 'macos-latest'
      run: |
        brew install cmake ninja
        
    # Build targets if specified
    - name: Build targets
      if: inputs.build_targets != ''
      run: |
        # Remove existing build directory to avoid generator mismatch
        if [ -d "build" ]; then
          rm -rf build
        fi
        
        mkdir -p build
        cd build
        
        # Use the same generator that was used to create the cache
        cmake -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON -DBUILD_BENCHMARKS=ON ..
        
        # Build targets
        if [ "${{ inputs.build_targets }}" == "all" ]; then
          make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)
        else
          make ${{ inputs.build_targets }} -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)
        fi
        
    # Upload build artifact if build_targets were specified
    - name: Upload build artifact
      if: inputs.build_targets != ''
      uses: actions/upload-artifact@v4
      with:
        name: build-artifact-${{ inputs.platform }}
        path: build/
        
    # Download build artifact if running tests and not building
    - name: Download build artifact
      if: inputs.test_targets != '' && inputs.build_targets == ''
      uses: actions/download-artifact@v4
      with:
        name: build-artifact-${{ inputs.platform }}
        path: build/
        
    # Run tests if specified
    - name: Run tests
      if: inputs.test_targets != ''
      run: |
        cd build
        echo "Listing contents of build directory before chmod:"
        ls -la

        echo "Making test executables runnable..."
        # Attempt to make all potential test files executable
        # This is important if execute permissions were lost during artifact packaging/extraction
        find . -name "*_tests" -type f -exec chmod +x {} \;
        find . -name "*_tests.exe" -type f -exec chmod +x {} \;

        echo "Listing contents of build directory after chmod:"
        ls -la
        echo "Finding executable test files after chmod:"
        find . -name "*_tests" -type f -executable -print -o -name "*_tests.exe" -type f -executable -print || true
        
        echo "Attempting to run test targets: ${{ inputs.test_targets }}"
        
        for target_name in ${{ inputs.test_targets }}; do
          echo "Looking for test: $target_name"
          EXECUTABLE_PATH=""
          if [ -f "./$target_name" ]; then
            EXECUTABLE_PATH="./$target_name"
          elif [ -f "./bin/$target_name" ]; then
            EXECUTABLE_PATH="./bin/$target_name"
          # CMake sometimes adds .exe on Windows even if not specified
          elif [ -f "./${target_name}.exe" ]; then
            EXECUTABLE_PATH="./${target_name}.exe"
          elif [ -f "./bin/${target_name}.exe" ]; then
            EXECUTABLE_PATH="./bin/${target_name}.exe"
          fi

          if [ -n "$EXECUTABLE_PATH" ]; then
            echo "Running test: $EXECUTABLE_PATH"
            $EXECUTABLE_PATH
          else
            echo "Error: Test executable '$target_name' not found in build/ or build/bin/."
            # List files again for debugging if a test is not found
            echo "Current files in build/:"
            ls -R .
            exit 1
          fi
        done
        
    # Removed the commented out old script for cleanliness 