# .github/workflows/package-deb.yml
name: Build & Package DEB

on:
  push:
    branches: [ packaging_builds ]
  pull_request:
    branches: [ packaging_builds ]

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake cpack

      - name: Build & test & package
        run: |
          mkdir build && cd build
          # configure & build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr
          make -j$(nproc)
          make check
          # cpack MUST run here in build/
          cpack -G DEB

      - name: Publish .deb
        uses: actions/upload-artifact@v2
        with:
          name: softposit-deb
          path: build/*.deb
